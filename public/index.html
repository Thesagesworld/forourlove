<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOL – For Our Love</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>FOL 💕</h1>
      <small>For Our Love</small>
      <button id="toggle-dark">🌙</button>
    </header>

    <section class="pair-box" id="pair-box">
      <h2>Conexión privada</h2>
      <div class="composer">
        <input id="pair-code" placeholder="Código numérico (ej: 482913)" inputmode="numeric" />
        <button id="apply-pair" type="button" class="send">Conectar</button>
      </div>
      <p id="pair-info" class="create-status"></p>
      <div class="pair-link-row">
        <input id="pair-link" readonly />
        <button id="copy-pair-link" type="button">Copiar enlace</button>
      </div>
    </section>

    <section id="stickers" class="stickers"></section>
    <button id="toggle-stickers" class="toggle-stickers" type="button">➕ Ver más moodcitos 💕</button>

    <form id="mood-form" class="composer">
      <input id="mini-message" maxlength="70" placeholder="Escribe un mini mensaje" required/>
      <button type="submit" class="send">Enviar</button>
    </form>

    <form id="create-sticker" class="composer">
      <input type="file" id="new-sticker-img" accept="image/png,image/jpeg,image/jpg,image/webp" required/>
      <input type="text" id="new-label" placeholder="Nombre del sticker" required/>
      <input type="text" id="new-mini" placeholder="Mini frase"/>
      <button type="submit">Crear Sticker</button>
    </form>
    <p id="create-status" class="create-status" aria-live="polite"></p>

    <section id="preview" class="preview">
      <div class="stamp">✨ Selecciona un sticker para empezar</div>
    </section>

    <section id="widget-preview" class="widget-mode">
      Último mood
    </section>

    <section id="history" class="history"></section>
  </main>

  <script type="module" src="app.js"></script>
  <script>
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("service-worker.js")
        .then(()=>console.log("SW registrado"))
        .catch(err=>console.log(err));
    }
  </script>
</body>
</html>
